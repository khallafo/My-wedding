<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            background-color: #f8f8f8;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .invitation {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin: 50px auto;
            width: 90%;
            max-width: 600px;
        }
        .flower {
            position: absolute;
            animation: float 3s infinite;
        }
        @keyframes float {
            0% { transform: translatey(0); }
            50% { transform: translatey(-20px); }
            100% { transform: translatey(0); }
        }
    </style>
</head>
<body>
    <div class="invitation">
        <h1>You are Invited to Our Wedding!</h1>
        <p>Join us for a day filled with love, joy, and celebration.</p>
        <p>Date: June 15, 2026</p>
        <p>Location: The Grand Hall</p>
        <div class="effects">
            <img src="flower.png" alt="Flower" class="flower">
            <img src="firework.png" alt="Firework" class="firework">
        </div>
    </div>
</body>
</html>
