<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahmoud & Nourhan - Wedding Celebration</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F4F1ED; 
            --primary-color: #72202E; 
            --accent-color: #C3A36D; 
            --text-color: #5A5A5A;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            text-align: center;
            overflow-x: hidden;
        }

        /* --- Welcome / Envelope Screen --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #E8E3DD; /* Match envelope background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out, transform 1s ease-out;
            cursor: pointer;
        }

        #welcome-screen.hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        .envelope-img {
            max-width: 80%;
            width: 400px;
            animation: pulse 2s infinite;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.1));
        }

        .tap-text {
            margin-top: 20px;
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* --- Main Content (Hidden Initially) --- */
        #main-content {
            opacity: 0;
            transition: opacity 1.5s ease-in;
            height: 100vh;
            overflow-y: auto;
        }

        #main-content.visible {
            opacity: 1;
        }

        /* Hero Section */
        .hero {
            padding: 60px 20px 20px;
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: var(--primary-color);
            margin: 10px 0;
            line-height: 1.2;
        }

        .getting-married {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: var(--text-color);
            margin: 20px 0;
        }

        .date-location {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-color);
            margin-top: 10px;
        }

        .divider {
            width: 50px;
            height: 2px;
            background-color: var(--accent-color);
            margin: 20px auto;
        }

        /* Countdown Section */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            font-family: 'Playfair Display', serif;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            color: var(--primary-color);
        }

        .time-box span { font-size: 2rem; font-weight: bold; }
        .time-box label { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; text-transform: uppercase; }

        /* --- Photo Slider (Pagination) --- */
        .slider-container {
            position: relative;
            max-width: 600px;
            margin: 40px auto;
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            border-radius: 10px;
        }

        .slides {
            display: none;
            width: 100%;
        }

        .slides.active {
            display: block;
            animation: fade 0.8s;
        }

        .slides img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(114, 32, 46, 0.5); /* Burgundy semi-transparent */
            border: none;
        }

        .next { right: 0; border-radius: 3px 0 0 3px; }
        .prev { left: 0; }
        .prev:hover, .next:hover { background-color: rgba(114, 32, 46, 0.9); }

        /* Pagination Dots */
        .dot-container {
            text-align: center;
            margin-top: 10px;
        }
        .dot {
            cursor: pointer;
            height: 10px;
            width: 10px;
            margin: 0 4px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }
        .active-dot, .dot:hover { background-color: var(--primary-color); }

        /* Location Section */
        .location-section {
            padding: 50px 20px;
            background-color: #fff;
            margin-top: 40px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="welcome-screen" onclick="openInvitation()">
        <img src="1774110796821.png" alt="Wedding Invitation" class="envelope-img">
        <div class="tap-text">Tap to open</div>
    </div>

    <div id="main-content">
        <section class="hero">
            <div class="subtitle">You are cordially invited to the wedding of</div>
            <div class="names">Mahmoud <br> <span style="font-size: 3rem;">&</span> <br> Nourhan</div>
            
            <div class="divider"></div>
            <div class="getting-married">Are getting married</div>
            
            <div class="date-location">
                May 9, 2026 • Cairo, Egypt
            </div>
            
            <div class="countdown" id="countdown">
                <div class="time-box"><span id="days">00</span><label>Days</label></div>
                <div class="time-box"><span>:</span><label>&nbsp;</label></div>
                <div class="time-box"><span id="hours">00</span><label>Hours</label></div>
                <div class="time-box"><span>:</span><label>&nbsp;</label></div>
                <div class="time-box"><span id="minutes">00</span><label>Mins</label></div>
                <div class="time-box"><span>:</span><label>&nbsp;</label></div>
                <div class="time-box"><span id="seconds">00</span><label>Secs</label></div>
            </div>
        </section>

        <section class="gallery-slider">
            <div class="getting-married">Our Story</div>
            <div class="slider-container">
                <div class="slides active"><img src="photo1.jpg" alt="Mahmoud and Nourhan"></div>
                <div class="slides"><img src="photo2.jpg" alt="Mahmoud and Nourhan"></div>
                <div class="slides"><img src="photo3.jpg" alt="Mahmoud and Nourhan"></div>
                <div class="slides"><img src="photo4.jpg" alt="Mahmoud and Nourhan"></div>
                <div class="slides"><img src="photo5.jpg" alt="Mahmoud and Nourhan"></div>
                <div class="slides"><img src="photo6.jpg" alt="Mahmoud and Nourhan"></div>
                <div class="slides"><img src="photo7.jpg" alt="Mahmoud and Nourhan"></div>
                <div class="slides"><img src="photo8.jpg" alt="Mahmoud and Nourhan"></div>

                <button class="prev" onclick="plusSlides(-1)">&#10094;</button>
                <button class="next" onclick="plusSlides(1)">&#10095;</button>
            </div>
            
            <div class="dot-container">
                <span class="dot active-dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
                <span class="dot" onclick="currentSlide(4)"></span>
                <span class="dot" onclick="currentSlide(5)"></span>
                <span class="dot" onclick="currentSlide(6)"></span>
                <span class="dot" onclick="currentSlide(7)"></span>
                <span class="dot" onclick="currentSlide(8)"></span>
            </div>
        </section>

        <section class="location-section">
            <div class="names" style="font-size: 3rem;">Join Us</div>
            <div class="divider"></div>
            <p style="font-weight: bold; margin-bottom: 5px;">The View Open Air Hall</p>
            <p style="margin-top: 0;">Galaa Club (نادي الجلاء)</p>
            <a href="https://maps.app.goo.gl/cfzu9YG9PvhgDU7R9?g_st=ac" target="_blank" class="btn">View on Google Maps</a>
        </section>
    </div>

    <script>
        // 1. Envelope Click & Music Play Logic
        function openInvitation() {
            const welcomeScreen = document.getElementById('welcome-screen');
            const mainContent = document.getElementById('main-content');
            const music = document.getElementById('bg-music');

            // Hide the envelope screen
            welcomeScreen.classList.add('hidden');
            
            // Show main content after delay
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                mainContent.classList.add('visible');
            }, 1000); // Wait for the fade out animation

            // Play music (will only work after user interaction, which is the click!)
            music.play().catch(error => console.log("Music play failed:", error));
        }

        // 2. Countdown Logic (May 9, 2026)
        const countDownDate = new Date("May 9, 2026 18:00:00").getTime();
        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(countdownInterval);
                document.getElementById("countdown").innerHTML = "<div class='getting-married'>Today is the day!</div>";
            }
        }, 1000);

        // 3. Slider (Pagination) Logic
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function currentSlide(n) {
            showSlides(slideIndex = n);
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("slides");
            let dots = document.getElementsByClassName("dot");
            if (n > slides.length) {slideIndex = 1}    
            if (n < 1) {slideIndex = slides.length}
            for (i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");  
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active-dot", "");
            }
            slides[slideIndex-1].classList.add("active");  
            dots[slideIndex-1].className += " active-dot";
        }
    </script>
</body>
</html>
